name: Build Android APK (HiYa!)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Add Android Platform & Sync
        run: |
          npm install @capacitor/cli @capacitor/core @capacitor/app @capacitor/filesystem
          npx cap init hiya com.hiya.app --web-dir dist
          npm install @capacitor/android
          npx cap add android
          
          # 使用精准的 Node.js 脚本将 intent-filter 准确塞入 activity 内部
          node -e "
          const fs = require('fs');
          const file = 'android/app/src/main/AndroidManifest.xml';
          let xml = fs.readFileSync(file, 'utf8');
          const intentFilter = \`
              <intent-filter>
                  <action android:name=\\\"android.intent.action.VIEW\\\" />
                  <category android:name=\\\"android.intent.category.DEFAULT\\\" />
                  <category android:name=\\\"android.intent.category.BROWSABLE\\\" />
                  <data android:scheme=\\\"content\\\" />
                  <data android:scheme=\\\"file\\\" />
                  <data android:mimeType=\\\"application/json\\\" />
                  <data android:host=\\\"*\\\" />
              </intent-filter>
          \`;
          xml = xml.replace('</activity>', intentFilter + '</activity>');
          fs.writeFileSync(file, xml);
          "

          # 处理图标
          mkdir -p assets
          if [ -f "icon.png" ]; then
            mv icon.png assets/icon.png
            npm install @capacitor/assets --save-dev
            npx capacitor-assets generate --android
          fi
          
          npx cap sync

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: hiya-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
